<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <title>FaidaHQ - All Features & Services</title>
      <meta content="width=device-width, initial-scale=1.0" name="viewport" />
      <meta
         content="inventory management, sales tracking, AI agent, e-commerce, accounting, social media automation"
         name="keywords"
      />
      <meta
         content="Everything FaidaHQ does — 10 tools to run your entire business in one place."
         name="description"
      />

      <!-- Google Web Fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
         href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Saira:wght@500;600;700&display=swap"
         rel="stylesheet"
      />

      <!-- Icon Font Stylesheet -->
      <link
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
         rel="stylesheet"
      />
      <link
         href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
         rel="stylesheet"
      />

      <!-- Libraries Stylesheet -->
      <link href="/lib/animate/animate.min.css" rel="stylesheet" />

      <!-- Customized Bootstrap Stylesheet -->
      <link href="/css/bootstrap.min.css" rel="stylesheet" />

      <!-- Template Stylesheet -->
      <link href="/css/style.css" rel="stylesheet" />
   </head>

   <body>
      <!-- Spinner Start -->
      <div
         id="spinner"
         class="show position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center"
      >
         <div class="spinner-grow text-primary" role="status"></div>
      </div>
      <!-- Spinner End -->

      
      <faidahq-navbar active="services"></faidahq-navbar>
      <!-- Page Header Start -->
      <div class="container-fluid page-header py-5">
         <div class="container text-center py-5">
            <h1 class="display-2 text-white mb-4 animated slideInDown">
               Our Features
            </h1>
            <nav aria-label="breadcrumb animated slideInDown">
               <ol class="breadcrumb justify-content-center mb-0">
                  <li class="breadcrumb-item"><a href="/">Home</a></li>
                  <li class="breadcrumb-item" aria-current="page">Features</li>
               </ol>
            </nav>
         </div>
      </div>
      <!-- Page Header End -->

      
      <faidahq-facts></faidahq-facts>
      <!-- Services Start -->
      <div class="container-fluid services py-5 my-5">
         <div class="container py-5">
            <div class="text-center mx-auto pb-5 wow fadeIn" data-wow-delay=".3s" style="max-width: 600px">
               <h5 class="text-primary">What We Offer</h5>
               <h1>5 Services. One Expert. Zero Guesswork.</h1>
            </div>
            <div class="row g-5 services-inner">
               <faidahq-service-card
                  icon="fas fa-globe"
                  title="Web Development"
                  description="Custom web applications tailored to your business needs. Responsive, fast, and built to convert visitors into customers."
                  href="/service-web-development/"
                  wow-delay=".3s">
               </faidahq-service-card>
               <faidahq-service-card
                  icon="fas fa-cogs"
                  title="Automation"
                  description="Streamline your workflows with custom automation solutions. Stop doing manually what machines can do better and faster."
                  href="/service-automation/"
                  wow-delay=".5s">
               </faidahq-service-card>
               <faidahq-service-card
                  icon="fas fa-phone-alt"
                  title="USSD App Development"
                  description="Develop lightweight, accessible USSD applications for seamless mobile interaction — no internet required."
                  href="/service-ussd/"
                  wow-delay=".7s">
               </faidahq-service-card>
               <faidahq-service-card
                  icon="fas fa-robot"
                  title="AI Integration"
                  description="Incorporate AI and machine learning into your products. Make smarter decisions backed by data and intelligent automation."
                  href="/service-ai-integration/"
                  wow-delay=".3s">
               </faidahq-service-card>
               <faidahq-service-card
                  icon="fas fa-mobile-alt"
                  title="Mobile App Development"
                  description="Progressive Web Apps and native mobile experiences that work beautifully on any device, anywhere."
                  href="/service-mobile/"
                  wow-delay=".5s">
               </faidahq-service-card>
            </div>
         </div>
      </div>
      <!-- Services End -->

      
      <faidahq-footer></faidahq-footer>
      <!-- Back to Top -->
      <a
         href="#"
         class="btn btn-secondary btn-square rounded-circle back-to-top"
         ><i class="fa fa-arrow-up text-white"></i
      ></a>

      <!-- JavaScript Libraries -->
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="/lib/wow/wow.min.js"></script>
      <script src="/lib/easing/easing.min.js"></script>
      <script src="/lib/waypoints/waypoints.min.js"></script>

      <!-- Template Javascript -->
            <!-- Web Components -->
      <script src="/js/components.js"></script>
      <script src="/js/main.js"></script>
   </body>
</html>
